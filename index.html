<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
       
        * {
            margin: 0;

            box-sizing: border-box;

        :root {

        [data-theme="dark"] {
            --primary: #7c7cff;

            border: 1px solid var(--border);

        [data-theme="dark"] .glass {
            background: linear-gradient(180deg, rgba(18,24,51,0.9), rgba(18,24,51,0.7));

        .app-container {
            max-width: 500px;

        .screen {
            position: absolute;

        .spinner {

        }
        
        
        #main-app {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-bottom: var(--nav-height);
        }
        
        .header {
            height: var(--header-height);

            align-items: center;

            margin-bottom: 20px;

        .header-title {

        .theme-toggle {
            width: 50px;

        .theme-toggle::after {

        [data-theme="dark"] .theme-toggle::after {

        .main-view {

        .bottom-nav {

        .nav-item {

        .nav-item.active {

        .nav-icon {

            margin-bottom: 4px;
        }
        
        .nav-label {
            font-size: 0.75rem;

        }
        
        
        .status-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;

        }
        
        .status-header {
            display: flex;
            align-items: center;
            justify-content: space-between;

        .status-title {

        }
        
        .status-indicator {
            display: flex;

        .status-dot {
            width: 10px;

        @keyframes pulse {

        .regions-grid {

        .region-btn {

        .flag-emoji {

        }
        
        .empty-description {
            max-width: 300px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        
        .number-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .number-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .number-flag {

        .copy-btn {
            width: 100%;
        }
        
       
        .message-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);

        .sender-avatar {
            width: 44px;

            border-radius: 50%;

            display: flex;

            justify-content: center;
            color: white;
            font-weight: 700;
            flex-shrink: 0;
        }
        
        .message-content {
            flex: 1;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;

        }
        
        .sender-name {

        }
        
        .message-time {
            font-size: 0.8rem;
            color: var(--text-sub);
        }
        
        .message-body {
            color: var(--text-main);
            line-height: 1.5;
            font-size: 0.95rem;
        }
        
        .otp-badge {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
            margin-top: 10px;
        }
        
       
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 1000;
            pointer-events: none;
        }
        
        .toast {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--success);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            pointer-events: all;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.error {
            border-left-color: var(--danger);
        }
        
        .toast-icon {
            font-size: 1.2rem;
        }
        
        .toast.success .toast-icon {
            color: var(--success);
        }
        
        .toast.error .toast-icon {
            color: var(--danger);
        }
        
        .toast-message {
            flex: 1;
            font-weight: 500;
        }
        
       
        .loader {
            text-align: center;
            padding: 40px 20px;
        }
        
        .loader-text {
            margin-top: 16px;
            color: var(--text-sub);
            font-weight: 500;
        }
        
       
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        
       
        @media (min-width: 768px) {
            .app-container {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
       
        <div id="splash-screen" class="screen active">
            <div class="app-logo">FazalWeb's&lt;/&gt;</div>
            <div class="spinner"></div>
            <p style="color: var(--text-sub); font-weight: 500;">Initializing Secure Link...</p>
        </div>
        
        
        <div id="auth-screen" class="screen">
            <div class="hero-illustration">
                <i class="fas fa-shield-alt shield-icon"></i>
            </div>
            <h1 class="title">Stay Anonymous</h1>
            <p class="description">Instantly generate disposable numbers for verification. No SIM card required.</p>
            <button id="start-btn" class="btn btn-primary">Start Now</button>
        </div>
        
        
        <div id="main-app" class="screen">
            <div class="header">
                <div class="header-title">AnujWeb's&lt;/&gt;</div>
                <div id="theme-toggle" class="theme-toggle"></div>
            </div>
            
            <div id="main-view" class="main-view">
                
                <div class="loader">
                    <div class="spinner"></div>
                    <p class="loader-text">Loading Secure Interface...</p>
                </div>
            </div>
            
            <div class="bottom-nav">
                <a href="#home" class="nav-item active" data-route="home">
                    <i class="fas fa-home nav-icon"></i>
                    <span class="nav-label">Home</span>
                </a>
                <a href="#numbers" class="nav-item" data-route="numbers">
                    <i class="fas fa-phone-alt nav-icon"></i>
                    <span class="nav-label">Numbers</span>
                </a>
                <a href="#inbox" class="nav-item" data-route="inbox">
                    <i class="fas fa-inbox nav-icon"></i>
                    <span class="nav-label">Inbox</span>
                </a>
            </div>
        </div>
        
       
        <div class="toast-container"></div>
    </div>
    
    <script>
        
        const API_KEY = "d8e5908eaamsh3467d94a68d3f73p1f40d7jsn1229ccd3004f";
        
       
        const state = {
            activeNumber: null,
            messages: [],
            isLoggedIn: false,
            themeMode: 'light',
            currentRoute: 'home'
        };
        
        
        const STORAGE_KEY = 'anuj_temp_clean_v4';
        
       
        const splashScreen = document.getElementById('splash-screen');
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        const mainView = document.getElementById('main-view');
        const startBtn = document.getElementById('start-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const navItems = document.querySelectorAll('.nav-item');
        const toastContainer = document.querySelector('.toast-container');
        
       
        const regions = [
            { flag: "🇺🇸", dialCode: "+1" },
            { flag: "🇬🇧", dialCode: "+44" },
            { flag: "🇨🇦", dialCode: "+1" },
            { flag: "🇦🇺", dialCode: "+61" },
            { flag: "🇩🇪", dialCode: "+49" },
            { flag: "🇫🇷", dialCode: "+33" },
            { flag: "🇯🇵", dialCode: "+81" },
            { flag: "🇸🇬", dialCode: "+65" }
        ];
        
        
        function initApp() {
            loadState();
            document.body.setAttribute('data-theme', state.themeMode);
            
            setTimeout(() => {
                splashScreen.classList.remove('active');
                if (state.isLoggedIn) {
                    mainApp.classList.add('active');
                    renderHomeScreen();
                } else {
                    authScreen.classList.add('active');
                }
            }, 2000);
            
            startBtn.addEventListener('click', handleStart);
            themeToggle.addEventListener('click', toggleTheme);
            setupRouter();
        }
        
        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    Object.assign(state, parsed);
                } catch (e) { console.error('Failed to parse state'); }
            }
        }
        
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
        
        function handleStart() {
            state.isLoggedIn = true;
            saveState();
            authScreen.classList.remove('active');
            mainApp.classList.add('active');
            
            state.messages.push({
                id: Date.now(),
                sender: 'System',
                initial: 'S',
                body: 'Secure line active. Ready to receive verifications.',
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                isOTP: false
            });
            
            saveState();
            renderHomeScreen();
        }
        
        function toggleTheme() {
            state.themeMode = state.themeMode === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', state.themeMode);
            saveState();
        }
        
        function setupRouter() {
            navItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const route = item.getAttribute('data-route');
                    navItems.forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                    navigate(route);
                });
            });
            if (state.isLoggedIn) navigate(state.currentRoute || 'home');
        }
        
        function navigate(route) {
            state.currentRoute = route;
            saveState();
            if(route === 'home') renderHomeScreen();
            else if(route === 'numbers') renderNumbersScreen();
            else if(route === 'inbox') renderInboxScreen();
        }
        
        function renderHomeScreen() {
            mainView.innerHTML = `
                <div class="fade-in">
                    <div class="status-card glass">
                        <div class="status-header">
                            <div class="status-title">Secure Gateway</div>
                            <div class="status-indicator"><div class="status-dot"></div><span>ONLINE</span></div>
                        </div>
                        <div class="status-description">Connection Encrypted (TLS 1.3)</div>
                    </div>
                    <h3 style="margin-bottom: 16px;">Available Regions</h3>
                    <div class="regions-grid">
                        ${regions.map(region => `
                            <div class="region-btn" data-code="${region.dialCode}" data-flag="${region.flag}">
                                <div class="flag-emoji">${region.flag}</div>
                                <div class="dial-code">${region.dialCode}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.querySelectorAll('.region-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    generateTempNumber(btn.getAttribute('data-code'), btn.getAttribute('data-flag'));
                });
            });
        }
        
        function generateTempNumber(dialCode, flag) {
            mainView.innerHTML = `<div class="loader"><div class="spinner"></div><p>Allocating Secure Line...</p></div>`;
            setTimeout(() => {
                const randomNum = Math.floor(1000000000 + Math.random() * 9000000000);
                const fullNumber = `${dialCode} ${randomNum.toString().replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3')}`;
                state.activeNumber = { flag, dialCode, number: fullNumber, createdAt: new Date().toISOString() };
                state.messages.push({
                    id: Date.now(), sender: 'Verification Service', initial: 'V',
                    body: `Your verification code is ${Math.floor(1000 + Math.random() * 9000)}`,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), isOTP: true
                });
                saveState();
                showToast('Line Activated', 'success');
                navItems.forEach(nav => nav.classList.remove('active'));
                document.querySelector('[data-route="numbers"]').classList.add('active');
                navigate('numbers');
            }, 1500);
        }
        
        function renderNumbersScreen() {
            if (state.activeNumber) {
                mainView.innerHTML = `
                    <div class="fade-in">
                        <div class="number-card glass">
                            <div class="number-header">
                                <div class="number-flag">${state.activeNumber.flag}</div>
                                <div style="color: var(--success); font-weight: 600;"><i class="fas fa-check-circle"></i> Active</div>
                            </div>
                            <div class="number-value">${state.activeNumber.number}</div>
                            <button id="copy-btn" class="btn btn-primary copy-btn"><i class="far fa-copy"></i> Copy Number</button>
                        </div>
                    </div>
                `;
                document.getElementById('copy-btn').addEventListener('click', copyNumberToClipboard);
            } else {
                mainView.innerHTML = `<div class="fade-in"><div class="empty-state"><div class="empty-icon"><i class="fas fa-phone-slash"></i></div><h3 class="empty-title">No Active Number</h3><button id="generate-btn" class="btn btn-primary">Generate Number</button></div></div>`;
                document.getElementById('generate-btn').addEventListener('click', () => { navigate('home'); });
            }
        }

        
        function copyNumberToClipboard() {
            if (!state.activeNumber) return;
            const textToCopy = state.activeNumber.number;

            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy)
                    .then(() => showToast('Copied to Clipboard', 'success'))
                    .catch(() => fallbackCopy(textToCopy));
            } else {
                fallbackCopy(textToCopy);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast('Copied to Clipboard', 'success');
            } catch (err) {
                showToast('Failed to copy', 'error');
            }
            document.body.removeChild(textArea);
        }

        function renderInboxScreen() {
            if (state.messages.length > 0) {
                mainView.innerHTML = `<div class="fade-in"><h3 style="margin-bottom: 20px;">Messages</h3>${state.messages.map(msg => `<div class="message-card"><div class="sender-avatar">${msg.initial}</div><div class="message-content"><div class="message-header"><div class="sender-name">${msg.sender}</div><div class="message-time">${msg.time}</div></div><div class="message-body">${msg.body}</div>${msg.isOTP ? `<div class="otp-badge">OTP CODE</div>` : ''}</div></div>`).join('')}</div>`;
            } else {
                mainView.innerHTML = `<div class="fade-in"><div class="empty-state"><div class="empty-icon"><i class="fas fa-comment-slash"></i></div><h3 class="empty-title">No Messages</h3></div></div>`;
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} toast-icon"></i><div class="toast-message">${message}</div>`;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toastContainer.removeChild(toast), 300);
            }, 3000);
        }
        
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
